<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broadcast - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin-style.css" />
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <h3>Admin Login</h3>
    <p>กรอก PIN เพื่อเข้าใช้งาน</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="• • • • • •" />
    <div class="error-msg" id="pinError"></div>
    <button class="btn btn-primary w-100" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="sidebar">
  <div class="brand">🛡️ Admin Panel</div>
  <a href="index.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
  <a href="members.html" class="nav-link"><span class="icon">👥</span> สมาชิก</a>
  <a href="payments.html" class="nav-link"><span class="icon">💳</span> การชำระเงิน</a>
  <a href="broadcast.html" class="nav-link active"><span class="icon">📢</span> Broadcast</a>
  <div style="position:absolute;bottom:20px;left:0;right:0;padding:0 20px;">
    <button class="btn btn-outline-light btn-sm w-100" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<div class="main-content">
  <div class="page-header">
    <h2>📢 ส่ง Broadcast Message</h2>
    <p>ส่งข้อความหาสมาชิกทั้งหมดหรือกลุ่มที่เลือก</p>
  </div>

  <div class="data-card" style="max-width:600px;">
    <div class="mb-3">
      <label class="form-label fw-bold">กลุ่มเป้าหมาย</label>
      <select class="form-select" id="broadcastTarget">
        <option value="all">👥 ผู้ใช้ทั้งหมด (เคยกด /start)</option>
        <option value="active_members">✅ สมาชิก VIP ที่ Active อยู่</option>
        <option value="expired">⏰ สมาชิกที่หมดอายุแล้ว</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold">ข้อความ (รองรับ HTML เช่น &lt;b&gt;, &lt;i&gt;)</label>
      <textarea class="form-control" id="broadcastMessage" rows="6"
        placeholder="พิมพ์ข้อความที่ต้องการส่ง...&#10;รองรับ HTML: &lt;b&gt;ตัวหนา&lt;/b&gt;, &lt;i&gt;ตัวเอียง&lt;/i&gt;"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold">ตัวอย่างข้อความ</label>
      <div id="messagePreview" class="p-3 border rounded bg-light" style="min-height:80px;white-space:pre-wrap;font-size:14px;"></div>
    </div>
    <div id="broadcastResult" class="mb-3"></div>
    <button class="btn btn-primary w-100" id="btnSendBroadcast"
      onclick="sendBroadcast()">
      📢 ส่ง Broadcast
    </button>
  </div>

  <!-- Broadcast History -->
  <div class="data-card mt-4">
    <div class="card-header-custom">
      <h5>📋 ประวัติการส่ง Broadcast</h5>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadBroadcastHistory()">🔄 รีเฟรช</button>
    </div>
    <div id="broadcastHistory">
      <div class="loading-spinner">⏳ กำลังโหลด...</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/broadcast.js"></script>
</body>
</html>
