<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>การชำระเงิน - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin-style.css" />
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <h3>Admin Login</h3>
    <p>กรอก PIN เพื่อเข้าใช้งาน</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="• • • • • •" />
    <div class="error-msg" id="pinError"></div>
    <button class="btn btn-primary w-100" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="sidebar">
  <div class="brand">🛡️ Admin Panel</div>
  <a href="index.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
  <a href="members.html" class="nav-link"><span class="icon">👥</span> สมาชิก</a>
  <a href="payments.html" class="nav-link active"><span class="icon">💳</span> การชำระเงิน</a>
  <a href="broadcast.html" class="nav-link"><span class="icon">📢</span> Broadcast</a>
  <div style="position:absolute;bottom:20px;left:0;right:0;padding:0 20px;">
    <button class="btn btn-outline-light btn-sm w-100" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<div class="main-content">
  <div class="page-header">
    <h2>💳 การชำระเงิน</h2>
    <p>ตรวจสอบและอนุมัติสลิปการชำระเงิน</p>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <select id="filterStatus" onchange="loadPayments()">
      <option value="pending">⏳ รอตรวจสอบ</option>
      <option value="approved">✅ อนุมัติแล้ว</option>
      <option value="rejected">❌ ปฏิเสธ</option>
      <option value="all">📋 ทั้งหมด</option>
    </select>
    <button class="btn btn-outline-secondary btn-sm" onclick="loadPayments()">🔄 รีเฟรช</button>
  </div>

  <div class="data-card">
    <div id="paymentsTable">
      <div class="loading-spinner">⏳ กำลังโหลด...</div>
    </div>
  </div>
</div>

<!-- Modal ดูสลิป -->
<div class="modal fade" id="slipModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">📸 สลิปการชำระเงิน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img id="slipImage" src="" alt="slip" style="max-width:100%;border-radius:8px;" />
        <div id="slipInfo" class="mt-3 text-start"></div>
      </div>
      <div class="modal-footer" id="slipActions"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/admin-auth.js"></script>
<script src="js/payments.js"></script>
</body>
</html>
