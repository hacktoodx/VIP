<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แนบสลิปการชำระเงิน</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ✅ เพิ่ม: style สำหรับ input หมายเหตุ */
    .note-section {
      margin-bottom: 80px;
    }

    .note-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000000);
      margin-bottom: 8px;
      display: block;
    }

    .note-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--tg-theme-hint-color, #cccccc);
      border-radius: 12px;
      background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000000);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .note-input:focus {
      border-color: var(--tg-theme-button-color, #2481cc);
    }

    .note-input::placeholder {
      color: var(--tg-theme-hint-color, #aaaaaa);
    }

    .upload-box {
      border: 2px dashed var(--tg-theme-hint-color, #cccccc);
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .upload-box:active {
      border-color: var(--tg-theme-button-color, #2481cc);
    }

    .upload-box img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 8px;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .upload-hint {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999999);
    }

    .order-badge {
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>📤 แนบสลิปการชำระเงิน</h1>
    <!-- ✅ แสดงสรุปรายการ -->
    <div class="order-badge" id="orderSummary">กำลังโหลด...</div>
  </div>

  <!-- Upload Box -->
  <div class="upload-box" id="uploadBox">
    <div id="uploadPlaceholder">
      <div class="upload-icon">📷</div>
      <div class="upload-hint">แตะเพื่อเลือกรูปสลิปการโอนเงิน</div>
    </div>
    <img id="previewImage" style="display:none;" alt="slip preview" />
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none;" />

  <!-- ✅ เพิ่ม: input หมายเหตุ -->
  <div class="note-section">
    <label class="note-label" for="noteInput">📝 หมายเหตุ (ถ้ามี)</label>
    <textarea
      id="noteInput"
      class="note-input"
      rows="3"
      maxlength="200"
      placeholder="เช่น โอนเมื่อ 14:30 น. หรือ ชำระผ่าน PromptPay..."
    ></textarea>
  </div>

  <button class="main-button" id="btnSubmit" disabled>กรุณาแนบสลิปก่อน</button>

  <script src="js/firebase-config.js"></script>
  <script src="js/upload-slip.js"></script>
</body>
</html>
