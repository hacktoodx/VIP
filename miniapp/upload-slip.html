<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แนบสลิปการชำระเงิน</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-header">
    <h1>📤 แนบสลิปการชำระเงิน</h1>
    <p id="orderSummary"></p>
  </div>

  <div class="upload-box" id="uploadBox">
    <div class="placeholder" id="uploadPlaceholder">
      📷 แตะเพื่อเลือกรูปสลิปการโอนเงิน
    </div>
    <img id="previewImage" style="display:none;" />
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none;" />

  <button class="main-button" id="btnSubmit" disabled>กรุณาแนบสลิปก่อน</button>

  <script src="js/firebase-config.js"></script>
  <script src="js/upload-slip.js"></script>
</body>
</html>
